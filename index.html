<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Baird Wang — Portfolio</title>
  <style>
    :root {
      --bg: #141414;
      --text: #f2ece4;
      --text-muted: rgba(242, 236, 228, 0.55);
      --contact-muted: #888888;
      /* Adobe .site-container */
      --site-max: 1400px;
      /* Max thumb canvas (work page scales down inside column) */
      --thumb-max-w: 610px;
      --detail-img-w: 1890px;
      /* Homepage "Baird Wang" font / thumb-column width */
      --name-thumb-ratio: 0.146;
      /* Project caption vs displayed thumb width (~24px / ~378px at 3-col desktop) */
      --caption-thumb-ratio: 0.06349;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    button {
      user-select: text;
      -webkit-user-select: text;
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      letter-spacing: 0.01em;
      user-select: text;
      -webkit-user-select: text;
    }

    #page-root .page {
      max-width: var(--site-max);
      width: 100%;
      margin: 0 auto;
      padding: clamp(0.625rem, 2vw, 1.25rem) clamp(1.25rem, 5vw, 3rem) clamp(4rem, 12vw, 7rem);
      box-sizing: border-box;
      container-type: inline-size;
      container-name: portfolio;
    }

    header {
      margin-bottom: clamp(0.5rem, 1.665vw, 0.917rem);
      text-align: center;
    }

    .name {
      margin: 0;
      font-weight: 100;
      letter-spacing: 0.06em;
      line-height: 1.1;
      transform: translateY(-10px);
    }

    /*
      Match homepage title to .thumb column width: min(% of .page, --thumb-max-w) * --name-thumb-ratio.
      Narrowest (≤540px): keep same ratio as widest, then 0.5×; drop 1rem floor so title tracks thumb.
    */
    /* Match homepage title scale to .thumb column: min(% of .page, --thumb-max-w) */
    #page-root .page > header .name {
      font-size: calc(clamp(3.375rem, 7.5vw, 4.05rem) * 0.85);
    }

    /* Narrowest: double space above "Baird Wang"; caption ratio uses @supports block below */
    @media (max-width: 540px) {
      #page-root .page {
        padding-top: calc(clamp(0.625rem, 2vw, 1.25rem) * 2);
      }

      #page-root .page > header .name {
        font-size: calc(clamp(3.375rem, 7.5vw, 4.05rem) * 0.85 * 0.5);
      }
    }

    @supports (font-size: 1cqi) {
      #page-root .page > header .name {
        font-size: clamp(
          1rem,
          calc(min(29cqi, var(--thumb-max-w)) * var(--name-thumb-ratio)),
          calc(4.05rem * 0.85)
        );
      }

      @media (max-width: 932px) {
        #page-root .page > header .name {
          font-size: clamp(
            1rem,
            calc(min(46.75cqi, var(--thumb-max-w)) * var(--name-thumb-ratio)),
            calc(4.05rem * 0.85)
          );
        }
      }

      @media (max-width: 540px) {
        #page-root .page > header .name {
          font-size: min(
            calc(4.05rem * 0.85 * 0.5),
            max(
              0.625rem,
              calc(min(100cqi, var(--thumb-max-w)) * var(--name-thumb-ratio) * 0.5)
            )
          );
        }
      }
    }

    /* Adobe .project-covers + .project-cover */
    .works {
      display: flex;
      flex-wrap: wrap;
      list-style: none;
      margin: 0;
      padding: calc(40px * 2 / 3 / 2) 0 0;
    }

    .work {
      box-sizing: border-box;
      width: 29%;
      margin-right: 6.5%;
      margin-bottom: 0;
      container-type: inline-size;
      container-name: work-card;
    }

    .work:nth-child(3n) {
      margin-right: 0;
    }

    .work-trigger {
      display: block;
      width: 100%;
      padding: 0;
      margin: 0;
      border: none;
      background: none;
      color: inherit;
      font: inherit;
      text-align: left;
      cursor: pointer;
      outline-offset: 4px;
      user-select: text;
      -webkit-user-select: text;
    }

    .thumb {
      position: relative;
      width: 100%;
      max-width: var(--thumb-max-w);
      aspect-ratio: 610 / 470;
      margin-left: auto;
      margin-right: auto;
      overflow: hidden;
      background: #111;
    }

    .thumb img {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.35s ease, transform 0.45s ease;
    }

    .work-trigger:hover .thumb img,
    .work-trigger:focus-visible .thumb img {
      opacity: 0.92;
      transform: scale(1.02);
    }

    /* Adobe .project-cover .title + .details-wrap; size tracks thumb via .work container */
    .caption {
      margin: 0 auto;
      padding-top: max(0px, calc(4.5% - 10px));
      padding-bottom: 0.33em;
      font-family: arial, sans-serif;
      font-size: clamp(14px, 3.8vw, 24px);
      font-weight: 300;
      line-height: 1.167;
      color: #eeeeee;
      letter-spacing: 0;
      text-align: center;
      text-transform: none;
      width: 90%;
    }

    @supports (font-size: 1cqi) {
      .caption {
        font-size: max(0.8125rem, calc(min(100cqi, var(--thumb-max-w)) * var(--caption-thumb-ratio)));
      }
    }

    .work .work-trigger {
      padding-bottom: 10%;
    }

    .contact {
      margin-top: clamp(1.77rem, 5.33vw, 3.1rem);
      max-width: 36rem;
    }

    .contact-head {
      display: inline-block;
      margin-bottom: 0;
    }

    .contact-title {
      margin: 0;
      font-size: 1.125rem;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--contact-muted);
    }

    .contact-rule {
      display: block;
      width: 100%;
      height: 1px;
      margin: 0.175rem 0 1.25rem;
      background: var(--contact-muted);
      opacity: 0.85;
    }

    .contact-lede {
      margin: 0 0 2rem;
      font-size: 0.9375rem;
      line-height: 1.65;
      color: var(--contact-muted);
    }

    .contact-email-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.65rem;
      margin-top: -10px;
    }

    .contact-email {
      margin: 0;
      font-size: clamp(1.25rem, 3vw, 1.65rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #ffffff;
    }

    .contact-copy-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      vertical-align: middle;
      transform: translateY(5px);
    }

    .contact-copy {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.25rem;
      margin: 0;
      border: none;
      background: none;
      color: #ffffff;
      cursor: pointer;
      border-radius: 4px;
      line-height: 0;
      user-select: text;
      -webkit-user-select: text;
    }

    .contact-copy:hover,
    .contact-copy:focus-visible {
      color: #f2ece4;
      background: rgba(255, 255, 255, 0.06);
      outline: none;
    }

    .contact-copy svg {
      display: block;
      width: calc(20px * 0.92);
      height: calc(20px * 0.92);
    }

    .contact-tooltip-hover {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 6px);
      transform: translateX(-50%);
      padding: 4px 8px;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      text-transform: none;
      color: #f2ece4;
      background: #2a2a2a;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 2;
    }

    .contact-copy-wrap:hover .contact-tooltip-hover,
    .contact-copy-wrap:focus-within .contact-tooltip-hover {
      opacity: 1;
    }

    .contact-copy-wrap.is-copied .contact-tooltip-hover {
      opacity: 0;
    }

    .contact-copy-toast {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 6px);
      transform: translateX(-50%);
      padding: 4px 8px;
      font-size: 0.75rem;
      color: #f2ece4;
      background: #2a2a2a;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 3;
    }

    .contact-copy-toast.is-visible {
      opacity: 1;
    }

    .contact-copy-toast.is-hiding {
      opacity: 0;
    }

    /*
      Marvel / project pages: body scroll + .site-container max-width 1400px.
      Single overlay uses document scrolling (native right scrollbar like Adobe).
    */
    .project-view {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      box-sizing: border-box;
      padding-left: max(16px, min(5vw, 120px));
      padding-right: max(16px, min(5vw, 120px));
    }

    .detail-inner {
      box-sizing: border-box;
      width: min(100%, var(--detail-img-w));
      max-width: var(--detail-img-w);
      margin: 0 auto;
      padding: clamp(1.25rem, 4vw, 2rem) 0 clamp(3rem, 8vw, 5rem);
    }

    .detail-top {
      box-sizing: border-box;
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: flex-start;
      gap: 0.35rem;
      min-height: 2.75rem;
      margin-bottom: clamp(1rem, 3vw, 1.5rem);
      padding: 0;
      text-align: center;
    }

    /* Fluid type: ~16px floor (mobile readability), scales down with viewport; WCAG has no px floor but 16px is widely used for body on phones */
    .detail-back-header {
      position: relative;
      flex: 0 0 auto;
      margin: 0;
      padding: 0;
      border: none;
      background: none;
      font: inherit;
      font-size: clamp(1rem, 0.82rem + 1.4vw, 1.625rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      color: #888888;
      cursor: pointer;
      text-align: left;
      user-select: text;
      -webkit-user-select: text;
      white-space: nowrap;
    }

    .detail-project-title.name {
      flex: 1 1 auto;
      min-width: 0;
      margin: 0;
      padding: 0;
      max-width: 100%;
      box-sizing: border-box;
      text-align: center;
      transform: none;
      font-size: clamp(1rem, 0.78rem + 2.4vw, calc(clamp(3.375rem, 7.5vw, 4.05rem) * 0.85 * 2 / 3));
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .detail-back-header:hover,
    .detail-back-header:focus-visible {
      color: #aaaaaa;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    #detail-body {
      padding: 0;
      width: 100%;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: left;
    }

    .detail-footer {
      box-sizing: border-box;
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem 2.5rem;
      justify-content: center;
      align-items: center;
      margin-top: clamp(2rem, 5vw, 3rem);
      padding: 1.75rem 0 0;
      border-top: 1px solid #2a2a2a;
    }

    .detail-footer-btn {
      margin: 0;
      padding: 0;
      border: none;
      background: none;
      color: var(--text-muted);
      font: inherit;
      font-size: 0.8125rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      user-select: text;
      -webkit-user-select: text;
    }

    .detail-footer-btn:hover,
    .detail-footer-btn:focus-visible {
      color: var(--text);
    }

    .detail-footer-icon {
      flex-shrink: 0;
      display: block;
    }

    .detail-note {
      box-sizing: border-box;
      margin: 0 0 1.5rem;
      padding: 0;
      font-size: 0.9375rem;
      line-height: 1.6;
      color: var(--text-muted);
      align-self: center;
      width: min(100%, var(--detail-img-w));
    }

    .detail-video {
      position: relative;
      box-sizing: border-box;
      width: min(100%, var(--detail-img-w));
      max-width: min(100%, var(--detail-img-w));
      margin: 0;
      margin-inline: auto;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #111;
    }

    .detail-video iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .detail-figure {
      margin: 0;
      display: block;
      max-width: min(100%, var(--detail-img-w));
      width: -moz-fit-content;
      width: fit-content;
      margin-inline: auto;
    }

    .detail-figure img {
      display: block;
      margin: 0;
      width: auto;
      max-width: min(100%, var(--detail-img-w));
      height: auto;
    }

    /* Phones: full-bleed media; header/footer keep small horizontal inset + safe area */
    @media (max-width: 600px) {
      .project-view {
        padding-left: 0;
        padding-right: 0;
      }

      .detail-inner {
        width: 100%;
        max-width: none;
        padding-left: 0;
        padding-right: 0;
      }

      .detail-top,
      .detail-footer {
        padding-left: max(12px, env(safe-area-inset-left, 0px));
        padding-right: max(12px, env(safe-area-inset-right, 0px));
      }

      .detail-note {
        width: 100%;
        max-width: none;
        padding-left: max(12px, env(safe-area-inset-left, 0px));
        padding-right: max(12px, env(safe-area-inset-right, 0px));
        box-sizing: border-box;
      }

      #detail-body {
        width: 100%;
      }

      .detail-figure {
        width: 100%;
        max-width: none;
        margin-inline: 0;
      }

      .detail-figure img {
        width: 100%;
        max-width: none;
        height: auto;
      }

      .detail-video {
        width: 100%;
        max-width: none;
        margin-inline: 0;
      }
    }

    @media (max-width: 932px) {
      .works {
        padding-top: calc(20px * 2 / 3 / 2);
      }

      .work {
        width: 46.75%;
      }

      .work:nth-child(2n) {
        margin-right: 0 !important;
      }

      .work:nth-child(3n) {
        margin-right: 6.5%;
      }

      .work:nth-child(3n + 1) {
        clear: none;
      }
    }

    @media (max-width: 540px) {
      .works {
        padding-top: calc(18px * 2 / 3 / 2);
      }

      .work {
        margin-right: 0 !important;
        width: 100%;
      }

    }
  </style>
</head>

          '<div class="detail-video detail-video--squid-vimeo"><iframe src="https://player.vimeo.com/video/' +
          vimeoId +
          '?title=0&amp;byline=0&amp;portrait=0&amp;controls=0&amp;muted=1&amp;autopause=1&amp;playsinline=1&amp;dnt=1&amp;badge=0&amp;vimeo_logo=0&amp;progress_bar=0" title="Embedded video" allow="autoplay; fullscreen; picture-in-picture; encrypted-media" allowfullscreen loading="lazy"></iframe></div>'
        );
      }

      function appendFigures(html, images, start, count) {
        var end = start + count;
        for (var i = start; i < end && i < images.length; i++) {
          html +=
            '<figure class="detail-figure"><img src="' +
            images[i] +
            '" alt="" loading="lazy" /></figure>';
        }
        return html;
      }

      function renderSquidGameUnleashedBody(p) {
        var imgs = p.images;
        var vimeoIds = ["1134762428", "1134763710", "1134763692", "1134763717"];
        var imageCountsBeforeVideo = [1, 4, 3, 10];
        var html = "";
        var idx = 0;
        for (var s = 0; s < vimeoIds.length; s++) {
          html = appendFigures(html, imgs, idx, imageCountsBeforeVideo[s]);
          idx += imageCountsBeforeVideo[s];
          html = appendSquidVimeoVideo(html, vimeoIds[s]);
        }
        html = appendFigures(html, imgs, idx, imgs.length - idx);
        return html;
      }

      function detailImgCapPx() {
        var raw = getComputedStyle(document.documentElement).getPropertyValue("--detail-img-w").trim();
        var n = parseInt(raw, 10);
        return isNaN(n) ? 1890 : n;
      }

      var detailResizeTimer;

      var detailMobileMaxPx = 600;

      function syncDetailVideoWidths() {
        if (detailEl.hidden) return;
        var vids = bodyEl.querySelectorAll(".detail-video");
        if (!vids.length) return;
        var narrow = bodyEl.clientWidth <= detailMobileMaxPx;
        if (narrow) {
          for (var z = 0; z < vids.length; z++) {
            vids[z].style.width = "";
            vids[z].style.maxWidth = "";
          }
          return;
        }
        var imgs = bodyEl.querySelectorAll(".detail-figure img");
        var maxW = 0;
        for (var i = 0; i < imgs.length; i++) {
          maxW = Math.max(maxW, imgs[i].offsetWidth);
        }
        var limit = Math.min(bodyEl.clientWidth, detailImgCapPx());
        var w = maxW > 0 ? Math.min(maxW, limit) : limit;
        if (w < 1) w = limit;
        for (var j = 0; j < vids.length; j++) {
          vids[j].style.width = w + "px";
          vids[j].style.maxWidth = "100%";
        }
      }

      function bindDetailImgLoadsForVideoSync() {
        function onImg() {
          syncDetailVideoWidths();
        }
        var imgs = bodyEl.querySelectorAll(".detail-figure img");
        for (var i = 0; i < imgs.length; i++) {
          if (!imgs[i].complete) {
            imgs[i].addEventListener("load", onImg);
            imgs[i].addEventListener("error", onImg);
          }
        }
      }

      window.addEventListener("resize", function () {
        window.clearTimeout(detailResizeTimer);
        detailResizeTimer = window.setTimeout(syncDetailVideoWidths, 80);
      });

      function renderProject(id) {
        var p = PROJECTS[id];
        if (!p) return;
        titleEl.textContent = p.title;
        document.title = p.title + " — Baird Wang";
        var html = "";
        if (p.note) {
          html +=
            '<p class="detail-note">' +
            p.note
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;") +
            "</p>";
        }
        if (id === "squid-game-unleashed") {
          html += renderSquidGameUnleashedBody(p);
        } else {
          var vids = p.videos || [];
          var imgs = p.images || [];
          var videosFirst = !p.videosAfterImages;
          if (videosFirst) {
            html = appendYoutubeVideos(html, vids);
          }
          for (var i = 0; i < imgs.length; i++) {
            html +=
              '<figure class="detail-figure"><img src="' +
              imgs[i] +
              '" alt="" loading="lazy" /></figure>';
          }
          if (!videosFirst) {
            html = appendYoutubeVideos(html, vids);
          }
        }
        bodyEl.innerHTML = html;
      }

      function openProjectView() {
        galleryScrollY = window.scrollY || document.documentElement.scrollTop || 0;
        pageRoot.hidden = true;
        detailEl.hidden = false;
        window.scrollTo(0, 0);
      }

      function closeProjectView() {
        teardownSquidVimeo();
        bodyEl.innerHTML = "";
        detailEl.hidden = true;
        pageRoot.hidden = false;
        titleEl.textContent = "";
        document.title = "Baird Wang — Portfolio";
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            window.scrollTo(0, galleryScrollY);
          });
        });
      }

      backHeaderBtn.addEventListener("click", function () {
        closeProjectView();
      });

      document.querySelectorAll(".work-trigger").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var id = btn.getAttribute("data-project");
          renderProject(id);
          openProjectView();
          requestAnimationFrame(function () {
            syncDetailVideoWidths();
            bindDetailImgLoadsForVideoSync();
            initSquidVimeoPlayers();
            requestAnimationFrame(syncDetailVideoWidths);
          });
        });
      });

      closeBottomBtn.addEventListener("click", function () {
        closeProjectView();
      });

      backTopBtn.addEventListener("click", function () {
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && !detailEl.hidden) {
          closeProjectView();
        }
      });

      var copyBtn = document.getElementById("contact-copy-btn");
      var emailTextEl = document.getElementById("contact-email-text");
      var copyToast = document.getElementById("contact-copy-toast");
      var copyWrap = copyBtn ? copyBtn.closest(".contact-copy-wrap") : null;
      var copyShowTimeout;
      var copyHideTimeout;

      function fallbackCopyText(text) {
        var ta = document.createElement("textarea");
        ta.value = text;
        ta.setAttribute("readonly", "");
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand("copy");
        } catch (err) {}
        document.body.removeChild(ta);
      }

      if (copyBtn && emailTextEl && copyToast && copyWrap) {
        copyBtn.addEventListener("click", function () {
          var email = emailTextEl.textContent.trim();

          function showCopiedToast() {
            window.clearTimeout(copyShowTimeout);
            window.clearTimeout(copyHideTimeout);
            copyToast.textContent = "Copied";
            copyToast.classList.remove("is-hiding");
            copyToast.classList.add("is-visible");
            copyWrap.classList.add("is-copied");
            copyShowTimeout = window.setTimeout(function () {
              copyToast.classList.add("is-hiding");
              copyToast.classList.remove("is-visible");
              copyHideTimeout = window.setTimeout(function () {
                copyToast.textContent = "";
                copyToast.classList.remove("is-hiding");
                copyWrap.classList.remove("is-copied");
              }, 450);
            }, 2000);
          }

          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(email).then(showCopiedToast).catch(function () {
              fallbackCopyText(email);
              showCopiedToast();
            });
          } else {
            fallbackCopyText(email);
            showCopiedToast();
          }
        });
      }
    })();
  </script>
</body>
</html>
