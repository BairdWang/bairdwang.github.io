<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Baird Wang — Portfolio</title>
  <style>
    :root {
      --bg: #141414;
      --text: #f2ece4;
      --text-muted: rgba(242, 236, 228, 0.55);
      --contact-muted: #888888;
      /* Adobe .site-container */
      --site-max: 1400px;
      /* Max thumb canvas (work page scales down inside column) */
      --thumb-max-w: 610px;
      --detail-img-w: 1890px;
      /* Homepage "Baird Wang" font / thumb-column width */
      --name-thumb-ratio: 0.146;
      /* Project caption vs displayed thumb width (~24px / ~378px at 3-col desktop) */
      --caption-thumb-ratio: 0.06349;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    button {
      user-select: text;
      -webkit-user-select: text;
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      letter-spacing: 0.01em;
      user-select: text;
      -webkit-user-select: text;
    }

    #page-root .page {
      max-width: var(--site-max);
      width: 100%;
      margin: 0 auto;
      padding: clamp(0.625rem, 2vw, 1.25rem) clamp(1.25rem, 5vw, 3rem) clamp(4rem, 12vw, 7rem);
      box-sizing: border-box;
      container-type: inline-size;
      container-name: portfolio;
    }

    header {
      margin-bottom: clamp(0.5rem, 1.665vw, 0.917rem);
      text-align: center;
    }

    .name {
      margin: 0;
      font-weight: 100;
      letter-spacing: 0.06em;
      line-height: 1.1;
      transform: translateY(-10px);
    }

    /*
      Match homepage title to .thumb column width: min(% of .page, --thumb-max-w) * --name-thumb-ratio.
      Narrowest (≤540px): keep same ratio as widest, then 0.5×; drop 1rem floor so title tracks thumb.
    */
    /* Match homepage title scale to .thumb column: min(% of .page, --thumb-max-w) */
    #page-root .page > header .name {
      font-size: calc(clamp(3.375rem, 7.5vw, 4.05rem) * 0.85);
    }

    /* Narrowest: double space above "Baird Wang"; caption ratio uses @supports block below */
    @media (max-width: 540px) {
      #page-root .page {
        padding-top: calc(clamp(0.625rem, 2vw, 1.25rem) * 2);
      }

      #page-root .page > header .name {
        font-size: calc(clamp(3.375rem, 7.5vw, 4.05rem) * 0.85 * 0.5);
      }
    }

    @supports (font-size: 1cqi) {
      #page-root .page > header .name {
        font-size: clamp(
          1rem,
          calc(min(29cqi, var(--thumb-max-w)) * var(--name-thumb-ratio)),
          calc(4.05rem * 0.85)
        );
      }

      @media (max-width: 932px) {
        #page-root .page > header .name {
          font-size: clamp(
            1rem,
            calc(min(46.75cqi, var(--thumb-max-w)) * var(--name-thumb-ratio)),
            calc(4.05rem * 0.85)
          );
        }
      }

      @media (max-width: 540px) {
        #page-root .page > header .name {
          font-size: min(
            calc(4.05rem * 0.85 * 0.5),
            max(
              0.625rem,
              calc(min(100cqi, var(--thumb-max-w)) * var(--name-thumb-ratio) * 0.5)
            )
          );
        }
      }
    }

    /* Adobe .project-covers + .project-cover */
    .works {
      display: flex;
      flex-wrap: wrap;
      list-style: none;
      margin: 0;
      padding: calc(40px * 2 / 3 / 2) 0 0;
    }

    .work {
      box-sizing: border-box;
      width: 29%;
      margin-right: 6.5%;
      margin-bottom: 0;
      container-type: inline-size;
      container-name: work-card;
    }

    .work:nth-child(3n) {
      margin-right: 0;
    }

    .work-trigger {
      display: block;
      width: 100%;
      padding: 0;
      margin: 0;
      border: none;
      background: none;
      color: inherit;
      font: inherit;
      text-align: left;
      cursor: pointer;
      outline-offset: 4px;
      user-select: text;
      -webkit-user-select: text;
    }

    .thumb {
      position: relative;
      width: 100%;
      max-width: var(--thumb-max-w);
      aspect-ratio: 610 / 470;
      margin-left: auto;
      margin-right: auto;
      overflow: hidden;
      background: #111;
    }

    .thumb img {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.35s ease, transform 0.45s ease;
    }

    .work-trigger:hover .thumb img,
    .work-trigger:focus-visible .thumb img {
      opacity: 0.92;
      transform: scale(1.02);
    }

    /* Adobe .project-cover .title + .details-wrap; size tracks thumb via .work container */
    .caption {
      margin: 0 auto;
      padding-top: max(0px, calc(4.5% - 10px));
      padding-bottom: 0.33em;
      font-family: arial, sans-serif;
      font-size: clamp(14px, 3.8vw, 24px);
      font-weight: 300;
      line-height: 1.167;
      color: #eeeeee;
      letter-spacing: 0;
      text-align: center;
      text-transform: none;
      width: 90%;
    }

    @supports (font-size: 1cqi) {
      .caption {
        font-size: max(0.8125rem, calc(min(100cqi, var(--thumb-max-w)) * var(--caption-thumb-ratio)));
      }
    }

    .work .work-trigger {
      padding-bottom: 10%;
    }

    .contact {
      margin-top: clamp(1.77rem, 5.33vw, 3.1rem);
      max-width: 36rem;
    }

    .contact-head {
      display: inline-block;
      margin-bottom: 0;
    }

    .contact-title {
      margin: 0;
      font-size: 1.125rem;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--contact-muted);
    }

    .contact-rule {
      display: block;
      width: 100%;
      height: 1px;
      margin: 0.175rem 0 1.25rem;
      background: var(--contact-muted);
      opacity: 0.85;
    }

    .contact-lede {
      margin: 0 0 2rem;
      font-size: 0.9375rem;
      line-height: 1.65;
      color: var(--contact-muted);
    }

    .contact-email-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.65rem;
      margin-top: -10px;
    }

    .contact-email {
      margin: 0;
      font-size: clamp(1.25rem, 3vw, 1.65rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #ffffff;
    }

    .contact-copy-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      vertical-align: middle;
      transform: translateY(5px);
    }

    .contact-copy {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.25rem;
      margin: 0;
      border: none;
      background: none;
      color: #ffffff;
      cursor: pointer;
      border-radius: 4px;
      line-height: 0;
      user-select: text;
      -webkit-user-select: text;
    }

    .contact-copy:hover,
    .contact-copy:focus-visible {
      color: #f2ece4;
      background: rgba(255, 255, 255, 0.06);
      outline: none;
    }

    .contact-copy svg {
      display: block;
      width: calc(20px * 0.92);
      height: calc(20px * 0.92);
    }

    .contact-tooltip-hover {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 6px);
      transform: translateX(-50%);
      padding: 4px 8px;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      text-transform: none;
      color: #f2ece4;
      background: #2a2a2a;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 2;
    }

    .contact-copy-wrap:hover .contact-tooltip-hover,
    .contact-copy-wrap:focus-within .contact-tooltip-hover {
      opacity: 1;
    }

    .contact-copy-wrap.is-copied .contact-tooltip-hover {
      opacity: 0;
    }

    .contact-copy-toast {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 6px);
      transform: translateX(-50%);
      padding: 4px 8px;
      font-size: 0.75rem;
      color: #f2ece4;
      background: #2a2a2a;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 3;
    }

    .contact-copy-toast.is-visible {
      opacity: 1;
    }

    .contact-copy-toast.is-hiding {
      opacity: 0;
    }

    /*
      Marvel / project pages: body scroll + .site-container max-width 1400px.
      Single overlay uses document scrolling (native right scrollbar like Adobe).
    */
    .project-view {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      box-sizing: border-box;
      padding-left: max(16px, min(5vw, 120px));
      padding-right: max(16px, min(5vw, 120px));
    }

    .detail-inner {
      box-sizing: border-box;
      width: min(100%, var(--detail-img-w));
      max-width: var(--detail-img-w);
      margin: 0 auto;
      padding: clamp(1.25rem, 4vw, 2rem) 0 clamp(3rem, 8vw, 5rem);
      --detail-back-pad: 0px;
    }

    .detail-top {
      box-sizing: border-box;
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: flex-start;
      gap: 0.35rem;
      min-height: 2.75rem;
      margin-bottom: clamp(1rem, 3vw, 1.5rem);
      padding: 0;
      padding-left: var(--detail-back-pad);
      text-align: center;
      width: 100%;
    }

    /* Fluid type: ~16px floor (mobile readability), scales down with viewport; WCAG has no px floor but 16px is widely used for body on phones */
    .detail-back-header {
      position: relative;
      flex: 0 0 auto;
      margin: 0;
      padding: 0;
      border: none;
      background: none;
      font: inherit;
      font-size: clamp(1rem, 0.82rem + 1.4vw, 1.625rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      color: #888888;
      cursor: pointer;
      text-align: left;
      user-select: text;
      -webkit-user-select: text;
      white-space: nowrap;
    }

    .detail-project-title.name {
      flex: 1 1 auto;
      min-width: 0;
      margin: 0;
      padding: 0;
      max-width: 100%;
      box-sizing: border-box;
      text-align: center;
      transform: none;
      font-size: clamp(1rem, 0.78rem + 2.4vw, calc(clamp(3.375rem, 7.5vw, 4.05rem) * 0.85 * 2 / 3));
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .detail-back-header:hover,
    .detail-back-header:focus-visible {
      color: #aaaaaa;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    #detail-body {
      padding: 0;
      width: 100%;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: left;
    }

    .detail-footer {
      box-sizing: border-box;
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem 2.5rem;
      justify-content: center;
      align-items: center;
      margin-top: clamp(2rem, 5vw, 3rem);
      padding: 1.75rem 0 0;
      border-top: 1px solid #2a2a2a;
    }

    .detail-footer-btn {
      margin: 0;
      padding: 0;
      border: none;
      background: none;
      color: var(--text-muted);
      font: inherit;
      font-size: 0.8125rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      user-select: text;
      -webkit-user-select: text;
    }

    .detail-footer-btn:hover,
    .detail-footer-btn:focus-visible {
      color: var(--text);
    }

    .detail-footer-icon {
      flex-shrink: 0;
      display: block;
    }

    .detail-note {
      box-sizing: border-box;
      margin: 0 0 1.5rem;
      padding: 0;
      font-size: 0.9375rem;
      line-height: 1.6;
      color: var(--text-muted);
      align-self: center;
      width: min(100%, var(--detail-img-w));
    }

    .detail-video {
      position: relative;
      box-sizing: border-box;
      width: min(100%, var(--detail-img-w));
      max-width: min(100%, var(--detail-img-w));
      margin: 0;
      margin-inline: auto;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #111;
    }

    .detail-video iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .detail-figure {
      margin: 0;
      display: block;
      max-width: min(100%, var(--detail-img-w));
      width: -moz-fit-content;
      width: fit-content;
      margin-inline: auto;
    }

    .detail-figure img {
      display: block;
      margin: 0;
      width: auto;
      max-width: min(100%, var(--detail-img-w));
      height: auto;
    }

    /* Phones: full-bleed media; header/footer keep small horizontal inset + safe area */
    @media (max-width: 600px) {
      .project-view {
        padding-left: 0;
        padding-right: 0;
      }

      .detail-inner {
        width: 100%;
        max-width: none;
        padding-left: 0;
        padding-right: 0;
      }

      .detail-top {
        padding-left: calc(max(12px, env(safe-area-inset-left, 0px)) + var(--detail-back-pad, 0px));
        padding-right: max(12px, env(safe-area-inset-right, 0px));
      }

      .detail-footer {
        padding-left: max(12px, env(safe-area-inset-left, 0px));
        padding-right: max(12px, env(safe-area-inset-right, 0px));
      }

      .detail-note {
        width: 100%;
        max-width: none;
        padding-left: max(12px, env(safe-area-inset-left, 0px));
        padding-right: max(12px, env(safe-area-inset-right, 0px));
        box-sizing: border-box;
      }

      #detail-body {
        width: 100%;
      }

      .detail-figure {
        width: 100%;
        max-width: none;
        margin-inline: 0;
      }

      .detail-figure img {
        width: 100%;
        max-width: none;
        height: auto;
      }

      .detail-video {
        width: 100%;
        max-width: none;
        margin-inline: 0;
      }
    }

    @media (max-width: 932px) {
      .works {
        padding-top: calc(20px * 2 / 3 / 2);
      }

      .work {
        width: 46.75%;
      }

      .work:nth-child(2n) {
        margin-right: 0 !important;
      }

      .work:nth-child(3n) {
        margin-right: 6.5%;
      }

      .work:nth-child(3n + 1) {
        clear: none;
      }
    }

    @media (max-width: 540px) {
      .works {
        padding-top: calc(18px * 2 / 3 / 2);
      }

      .work {
        margin-right: 0 !important;
        width: 100%;
      }

    }
  </style>
</head>
<body>
  <div id="page-root">
  <div class="page">
    <header>
      <h1 class="name">Baird Wang</h1>
    </header>

    <ul class="works" id="home-works" aria-label="Selected work"></ul>

    <section class="contact" id="contact" aria-labelledby="contact-heading">
      <div class="contact-head">
        <h2 class="contact-title" id="contact-heading">CONTACT</h2>
        <span class="contact-rule" aria-hidden="true"></span>
      </div>
      <p class="contact-lede">
        Have an interesting project in mind, or just want to say hello? Feel free to reach out.
      </p>
      <div class="contact-email-row">
        <span class="contact-email" id="contact-email-text">younger4005@gmail.com</span>
        <span class="contact-copy-wrap">
          <button type="button" class="contact-copy" id="contact-copy-btn" aria-label="Copy email to clipboard">
            <svg class="contact-copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
            </svg>
          </button>
          <span class="contact-tooltip-hover" aria-hidden="true">Copy</span>
          <span class="contact-copy-toast" id="contact-copy-toast" role="status" aria-live="polite"></span>
        </span>
      </div>
    </section>
  </div>
  </div>

  <div id="detail" class="project-view" hidden>
    <div class="detail-inner">
      <div class="detail-top">
        <button type="button" class="detail-back-header" id="detail-back-header" aria-label="Back to gallery">&lt; Back</button>
        <h1 class="name detail-project-title" id="detail-project-heading"></h1>
      </div>
      <div id="detail-body"></div>
      <div class="detail-footer">
        <button type="button" class="detail-footer-btn" id="detail-close-bottom">
          <svg class="detail-footer-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
          Close
        </button>
        <button type="button" class="detail-footer-btn" id="detail-back-top">
          <svg class="detail-footer-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 19V5M5 12l7-7 7 7" />
          </svg>
          Back to Top
        </button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var pageRoot = document.getElementById("page-root");
      var detailEl = document.getElementById("detail");
      var titleEl = document.getElementById("detail-project-heading");
      var bodyEl = document.getElementById("detail-body");
      var closeBottomBtn = document.getElementById("detail-close-bottom");
      var backTopBtn = document.getElementById("detail-back-top");
      var backHeaderBtn = document.getElementById("detail-back-header");
      var galleryScrollY = 0;
      var SITE_DATA = null;

      function getProject(id) {
        if (!SITE_DATA || !SITE_DATA.projects) return null;
        var base = SITE_DATA.projects[id];
        if (!base) return null;
        var o = {};
        for (var k in base) {
          if (Object.prototype.hasOwnProperty.call(base, k)) {
            o[k] = base[k];
          }
        }
        return o;
      }

      function bool01(v, d) {
        var z = v !== undefined ? v : d;
        return z ? "1" : "0";
      }

      function portfolioVimeoEmbedSrc(vimeoId, opts) {
        opts = opts || {};
        return (
          "https://player.vimeo.com/video/" +
          vimeoId +
          "?autoplay=" +
          bool01(opts.autoplay, true) +
          "&muted=" +
          bool01(opts.muted, true) +
          "&loop=" +
          bool01(opts.loop, true) +
          "&autopause=" +
          bool01(opts.autopause, false) +
          "&controls=" +
          bool01(opts.controls, true) +
          "&title=" +
          bool01(opts.title, false) +
          "&byline=" +
          bool01(opts.byline, false) +
          "&portrait=" +
          bool01(opts.portrait, false) +
          "&playsinline=" +
          bool01(opts.playsinline, true)
        );
      }

      function escAttr(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function renderHomeWorks() {
        var ul = document.getElementById("home-works");
        if (!ul || !SITE_DATA || !SITE_DATA.home || !SITE_DATA.home.work) return;
        var items = SITE_DATA.home.work;
        var h = "";
        for (var i = 0; i < items.length; i++) {
          var w = items[i];
          h +=
            '<li class="work"><button type="button" class="work-trigger" data-project="' +
            escAttr(w.id) +
            '"><div class="thumb"><img src="' +
            escAttr(w.thumb) +
            '" alt="' +
            escAttr(w.alt || "") +
            '" width="610" height="470" loading="lazy" /></div><p class="caption">' +
            escAttr(w.caption || "") +
            "</p></button></li>";
        }
        ul.innerHTML = h;
      }

      function applyHomeContact() {
        if (!SITE_DATA) return;
        if (SITE_DATA.site && SITE_DATA.site.headerName) {
          var siteHeader = document.querySelector("#page-root .name");
          if (siteHeader) siteHeader.textContent = SITE_DATA.site.headerName;
        }
        if (!SITE_DATA.home || !SITE_DATA.home.contact) return;
        var c = SITE_DATA.home.contact;
        var lede = document.querySelector(".contact-lede");
        if (lede && c.lede) lede.textContent = c.lede;
        var em = document.getElementById("contact-email-text");
        if (em && c.email) em.textContent = c.email;
      }

      function bindWorkTriggers() {
        var root = document.getElementById("home-works");
        if (!root) return;
        root.querySelectorAll(".work-trigger").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var id = btn.getAttribute("data-project");
            renderProject(id);
            openProjectView();
            requestAnimationFrame(function () {
              syncDetailVideoWidths();
              bindDetailImgLoadsForVideoSync();
              requestAnimationFrame(syncDetailVideoWidths);
            });
          });
        });
      }

      function renderBlocksBody(p) {
        var blocks = p.blocks;
        if (!blocks || !blocks.length) return "";
        var vOpts = p.vimeoEmbedOptions || null;
        var html = "";
        for (var i = 0; i < blocks.length; i++) {
          var b = blocks[i];
          if (!b || !b.type) continue;
          if (b.type === "image" && b.src) {
            html +=
              '<figure class="detail-figure"><img src="' +
              escAttr(b.src) +
              '" alt="" loading="lazy" /></figure>';
          } else if (b.type === "vimeo" && b.id) {
            var rawSrc = portfolioVimeoEmbedSrc(String(b.id), vOpts);
            html +=
              '<div class="detail-video"><iframe src="' +
              escAttr(rawSrc) +
              '" title="Embedded video" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen loading="lazy"></iframe></div>';
          }
        }
        return html;
      }

      function appendYoutubeVideos(html, videos) {
        for (var v = 0; v < videos.length; v++) {
          html +=
            '<div class="detail-video"><iframe src="https://www.youtube.com/embed/' +
            videos[v] +
            '" title="Embedded video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen loading="lazy"></iframe></div>';
        }
        return html;
      }

      function appendPortfolioVimeoBlock(html, vimeoId, vimeoOpts) {
        var raw = portfolioVimeoEmbedSrc(String(vimeoId), vimeoOpts || null);
        return (
          html +
          '<div class="detail-video"><iframe src="' +
          escAttr(raw) +
          '" title="Embedded video" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen loading="lazy"></iframe></div>'
        );
      }

      function appendFigures(html, images, start, count) {
        var end = start + count;
        for (var i = start; i < end && i < images.length; i++) {
          html +=
            '<figure class="detail-figure"><img src="' +
            images[i] +
            '" alt="" loading="lazy" /></figure>';
        }
        return html;
      }

      function renderSquidGameUnleashedBody(p) {
        var imgs = p.images;
        var vimeoIds = ["1134762428", "1134763710", "1134763692", "1134763717"];
        var imageCountsBeforeVideo = [1, 4, 3, 10];
        var vimeoOpts = p.vimeoEmbedOptions || null;
        var html = "";
        var idx = 0;
        for (var s = 0; s < vimeoIds.length; s++) {
          html = appendFigures(html, imgs, idx, imageCountsBeforeVideo[s]);
          idx += imageCountsBeforeVideo[s];
          html = appendPortfolioVimeoBlock(html, vimeoIds[s], vimeoOpts);
        }
        html = appendFigures(html, imgs, idx, imgs.length - idx);
        return html;
      }

      function detailImgCapPx() {
        var raw = getComputedStyle(document.documentElement).getPropertyValue("--detail-img-w").trim();
        var n = parseInt(raw, 10);
        return isNaN(n) ? 1890 : n;
      }

      var detailResizeTimer;

      var detailMobileMaxPx = 600;

      function syncDetailVideoWidths() {
        if (detailEl.hidden) return;
        var vids = bodyEl.querySelectorAll(".detail-video");
        if (!vids.length) {
          syncDetailBackPad();
          return;
        }
        var narrow = bodyEl.clientWidth <= detailMobileMaxPx;
        if (narrow) {
          for (var z = 0; z < vids.length; z++) {
            vids[z].style.width = "";
            vids[z].style.maxWidth = "";
          }
          syncDetailBackPad();
          return;
        }
        var imgs = bodyEl.querySelectorAll(".detail-figure img");
        var maxW = 0;
        for (var i = 0; i < imgs.length; i++) {
          maxW = Math.max(maxW, imgs[i].offsetWidth);
        }
        var limit = Math.min(bodyEl.clientWidth, detailImgCapPx());
        var w = maxW > 0 ? Math.min(maxW, limit) : limit;
        if (w < 1) w = limit;
        for (var j = 0; j < vids.length; j++) {
          vids[j].style.width = w + "px";
          vids[j].style.maxWidth = "100%";
        }
        syncDetailBackPad();
      }

      function syncDetailBackPad() {
        var inner = bodyEl.parentElement;
        if (!inner || !inner.classList.contains("detail-inner")) return;
        if (detailEl.hidden) {
          inner.style.setProperty("--detail-back-pad", "0px");
          return;
        }
        var media = bodyEl.querySelector(".detail-figure, .detail-video");
        if (!media) {
          inner.style.setProperty("--detail-back-pad", "0px");
          return;
        }
        var ir = inner.getBoundingClientRect();
        var mr = media.getBoundingClientRect();
        var pad = mr.left - ir.left;
        if (!isFinite(pad) || pad < 0) pad = 0;
        if (pad > ir.width) pad = 0;
        inner.style.setProperty("--detail-back-pad", Math.round(pad) + "px");
      }

      function bindDetailImgLoadsForVideoSync() {
        function onImg() {
          syncDetailVideoWidths();
          syncDetailBackPad();
        }
        var imgs = bodyEl.querySelectorAll(".detail-figure img");
        for (var i = 0; i < imgs.length; i++) {
          if (!imgs[i].complete) {
            imgs[i].addEventListener("load", onImg);
            imgs[i].addEventListener("error", onImg);
          }
        }
      }

      window.addEventListener("resize", function () {
        window.clearTimeout(detailResizeTimer);
        detailResizeTimer = window.setTimeout(function () {
          syncDetailVideoWidths();
          syncDetailBackPad();
        }, 80);
      });

      function renderProject(id) {
        var p = getProject(id);
        if (!p) return;
        titleEl.textContent = p.title;
        document.title = p.title + " — Baird Wang";
        var html = "";
        if (p.note) {
          html +=
            '<p class="detail-note">' +
            p.note
              .replace(/&/g, "&amp;")
           .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;") +
            "</p>";
        }
        if (p.blocks && p.blocks.length) {
          html += renderBlocksBody(p);
        } else if (id === "squid-game-unleashed") {
          html += renderSquidGameUnleashedBody(p);
        } else {
          var vids = p.videos || [];
          var imgs = p.images || [];
          var videosFirst = !p.videosAfterImages;
          if (videosFirst) {
            html = appendYoutubeVideos(html, vids);
          }
          for (var i = 0; i < imgs.length; i++) {
            html +=
              '<figure class="detail-figure"><img src="' +
              imgs[i] +
              '" alt="" loading="lazy" /></figure>';
          }
          if (!videosFirst) {
            html = appendYoutubeVideos(html, vids);
          }
        }
        bodyEl.innerHTML = html;
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            syncDetailVideoWidths();
            syncDetailBackPad();
          });
        });
      }

      function openProjectView() {
        galleryScrollY = window.scrollY || document.documentElement.scrollTop || 0;
        pageRoot.hidden = true;
        detailEl.hidden = false;
        window.scrollTo(0, 0);
      }

      function closeProjectView() {
        var inner = bodyEl.parentElement;
        if (inner && inner.classList.contains("detail-inner")) {
          inner.style.setProperty("--detail-back-pad", "0px");
        }
        bodyEl.innerHTML = "";
        detailEl.hidden = true;
        pageRoot.hidden = false;
        titleEl.textContent = "";
        document.title = "Baird Wang — Portfolio";
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            window.scrollTo(0, galleryScrollY);
          });
        });
      }

      backHeaderBtn.addEventListener("click", function () {
        closeProjectView();
      });

      closeBottomBtn.addEventListener("click", function () {
        closeProjectView();
      });

      backTopBtn.addEventListener("click", function () {
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && !detailEl.hidden) {
          closeProjectView();
        }
      });

      var copyBtn = document.getElementById("contact-copy-btn");
      var emailTextEl = document.getElementById("contact-email-text");
      var copyToast = document.getElementById("contact-copy-toast");
      var copyWrap = copyBtn ? copyBtn.closest(".contact-copy-wrap") : null;
      var copyShowTimeout;
      var copyHideTimeout;

      function fallbackCopyText(text) {
        var ta = document.createElement("textarea");
        ta.value = text;
        ta.setAttribute("readonly", "");
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand("copy");
        } catch (err) {}
        document.body.removeChild(ta);
      }

      if (copyBtn && emailTextEl && copyToast && copyWrap) {
        copyBtn.addEventListener("click", function () {
          var email = emailTextEl.textContent.trim();

          function showCopiedToast() {
            window.clearTimeout(copyShowTimeout);
            window.clearTimeout(copyHideTimeout);
            copyToast.textContent = "Copied";
            copyToast.classList.remove("is-hiding");
            copyToast.classList.add("is-visible");
            copyWrap.classList.add("is-copied");
            copyShowTimeout = window.setTimeout(function () {
              copyToast.classList.add("is-hiding");
              copyToast.classList.remove("is-visible");
              copyHideTimeout = window.setTimeout(function () {
                copyToast.textContent = "";
                copyToast.classList.remove("is-hiding");
                copyWrap.classList.remove("is-copied");
              }, 450);
            }, 2000);
          }

          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(email).then(showCopiedToast).catch(function () {
              fallbackCopyText(email);
              showCopiedToast();
            });
          } else {
            fallbackCopyText(email);
            showCopiedToast();
          }
        });
      }

      fetch("site-data.json")
        .then(function (r) {
          return r.ok ? r.json() : null;
        })
        .then(function (data) {
          SITE_DATA =
            data && typeof data === "object"
              ? data
              : { version: 1, projects: {}, home: { work: [], contact: {} }, site: {} };
          renderHomeWorks();
          applyHomeContact();
          bindWorkTriggers();
        })
        .catch(function () {
          SITE_DATA = { version: 1, projects: {}, home: { work: [], contact: {} }, site: {} };
          renderHomeWorks();
          applyHomeContact();
          bindWorkTriggers();
        });
    })();
  </script>
</body>
</html>
