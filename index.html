<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Baird Wang — Portfolio</title>
  <style>
    :root {
      --bg: #000000;
      --text: #f2ece4;
      --text-muted: rgba(242, 236, 228, 0.55);
      --contact-muted: #888888;
      --gap: clamp(14px, 1.35vw, 22px);
      --max: min(100%, 1800px);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      letter-spacing: 0.01em;
    }

    .page {
      max-width: var(--max);
      margin: 0 auto;
      padding: clamp(0.625rem, 2vw, 1.25rem) clamp(1.25rem, 5vw, 3rem) clamp(4rem, 12vw, 7rem);
    }

    header {
      margin-bottom: clamp(1.5rem, 5vw, 2.75rem);
    }

    .name {
      margin: 0;
      font-size: clamp(3.375rem, 7.5vw, 4.05rem);
      font-weight: 100;
      letter-spacing: 0.06em;
      line-height: 1.1;
    }

    .works {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gap);
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .work {
      margin: 0;
    }

    .work-trigger {
      display: block;
      width: 100%;
      padding: 0;
      margin: 0;
      border: none;
      background: none;
      color: inherit;
      font: inherit;
      text-align: left;
      cursor: pointer;
      outline-offset: 4px;
    }

    .thumb {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #111;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.35s ease, transform 0.45s ease;
    }

    .work-trigger:hover .thumb img,
    .work-trigger:focus-visible .thumb img {
      opacity: 0.92;
      transform: scale(1.02);
    }

    .caption {
      margin-top: clamp(0.5rem, 1.2vw, 0.75rem);
      font-size: 0.8125rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    .contact {
      margin-top: clamp(1.77rem, 5.33vw, 3.1rem);
      max-width: 36rem;
    }

    .contact-title {
      margin: 0;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--contact-muted);
    }

    .contact-rule {
      display: block;
      width: 5.5rem;
      height: 1px;
      margin: 1rem 0 1.5rem;
      background: var(--contact-muted);
      opacity: 0.85;
    }

    .contact-lede {
      margin: 0 0 2rem;
      font-size: 0.9375rem;
      line-height: 1.65;
      color: var(--contact-muted);
    }

    .contact-email {
      margin: 0;
      font-size: clamp(1.25rem, 3vw, 1.65rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #ffffff;
    }

    .contact-email a {
      color: inherit;
      text-decoration: none;
    }

    .contact-email a:hover,
    .contact-email a:focus-visible {
      text-decoration: underline;
      text-underline-offset: 0.2em;
    }

    #detail {
      width: min(100vw - 2rem, 1920px);
      max-width: 1920px;
      max-height: min(96vh, 100%);
      margin: auto;
      padding: 0;
      border: none;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    #detail::backdrop {
      background: rgba(0, 0, 0, 0.78);
    }

    .detail-inner {
      padding: clamp(1rem, 3vw, 1.5rem) 0 clamp(1.25rem, 3vw, 2rem);
      max-height: min(96vh, 100%);
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .detail-inner::-webkit-scrollbar,
    #detail::-webkit-scrollbar {
      display: none;
      width: 0 !important;
      height: 0 !important;
      background: transparent;
    }

    .detail-top {
      padding: 0 clamp(0.5rem, 2vw, 1rem);
      margin-bottom: 1.25rem;
    }

    .detail-title {
      margin: 0;
      font-size: clamp(1.25rem, 3vw, 1.5rem);
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    #detail-body {
      padding: 0;
      max-width: 1920px;
      margin: 0 auto;
    }

    .detail-footer {
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem 2rem;
      justify-content: flex-start;
      align-items: center;
      margin-top: 2rem;
      padding: 1.5rem clamp(0.5rem, 2vw, 1rem) 0;
      border-top: 1px solid #2a2a2a;
    }

    .detail-footer button {
      margin: 0;
      padding: 0;
      border: none;
      background: none;
      color: var(--text-muted);
      font: inherit;
      font-size: 0.8125rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
    }

    .detail-footer button:hover,
    .detail-footer button:focus-visible {
      color: var(--text);
    }

    .detail-note {
      margin: 0 0 1.5rem;
      font-size: 0.9375rem;
      line-height: 1.6;
      color: var(--text-muted);
    }

    .detail-video {
      position: relative;
      width: 100%;
      max-width: 1920px;
      margin: 0 auto 0;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #111;
    }

    .detail-video iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .detail-figure {
      margin: 0;
      display: block;
    }

    .detail-figure img {
      display: block;
      width: 100%;
      height: auto;
    }

    @media (max-width: 900px) {
      .works {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 520px) {
      .works {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

      var dialogEl = document.getElementById("detail");
      var scrollEl = document.getElementById("detail-scroll");
      var titleEl = document.getElementById("detail-title");
      var bodyEl = document.getElementById("detail-body");
      var closeBottomBtn = document.getElementById("detail-close-bottom");
      var backTopBtn = document.getElementById("detail-back-top");

      function renderProject(id) {
        var p = PROJECTS[id];
        if (!p) return;
        titleEl.textContent = p.title;
        var html = "";
        if (p.note) {
          html +=
            '<p class="detail-note">' +
            p.note
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;") +
            "</p>";
        }
        for (var v = 0; v < p.videos.length; v++) {
          var vid = p.videos[v];
          html +=
            '<div class="detail-video"><iframe src="https://www.youtube.com/embed/' +
            vid +
            '" title="Embedded video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen loading="lazy"></iframe></div>';
        }
        for (var i = 0; i < p.images.length; i++) {
          html +=
            '<figure class="detail-figure"><img src="' +
            p.images[i] +
            '" alt="" loading="lazy" /></figure>';
        }
        bodyEl.innerHTML = html;
        if (scrollEl) {
          scrollEl.scrollTop = 0;
        }
      }

      function lockPageScroll(lock) {
        var v = lock ? "hidden" : "";
        document.documentElement.style.overflow = v;
        document.body.style.overflow = v;
      }

      dialogEl.addEventListener("close", function () {
        lockPageScroll(false);
      });

      document.querySelectorAll(".work-trigger").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var id = btn.getAttribute("data-project");
          renderProject(id);
          lockPageScroll(true);
          dialogEl.showModal();
        });
      });

      closeBottomBtn.addEventListener("click", function () {
        dialogEl.close();
      });

      backTopBtn.addEventListener("click", function () {
        if (scrollEl) {
          scrollEl.scrollTo({ top: 0, behavior: "smooth" });
        }
      });

      dialogEl.addEventListener("click", function (e) {
        if (e.target === dialogEl) {
          dialogEl.close();
        }
      });
    })();
  </script>
